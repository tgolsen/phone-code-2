name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2

permissions:
  id-token: write
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/phone-code
          tags: |
            type=sha,format=short
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lambda:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Lambda
        working-directory: session-broker
        run: |
          npm ci
          zip -r ../lambda.zip .

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name phone-code-broker \
            --zip-file fileb://lambda.zip

      - name: Update ECS task definition revision
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition phone-code-session \
            --query 'taskDefinition' \
            --output json)
          echo "$TASK_DEF" | jq 'del(.status, .taskDefinitionArn, .revision, .compatibilities, .registeredAt, .registeredBy, .requiresAttributes)' > /tmp/task-def.json
          aws ecs register-task-definition --cli-input-json file:///tmp/task-def.json
